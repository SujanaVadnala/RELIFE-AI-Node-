      position: fixed;

    .item-card {

    @media (max-width: 450px) {
      .app-wrapper {

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, where, getDocs } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.14.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBOPmt7VHvKphPe6SUECih058r0TTel8qk",
    authDomain: "relife-ai-6a941.firebaseapp.com",
    projectId: "relife-ai-6a941",
    storageBucket: "relife-ai-6a941.firebasestorage.app",
    messagingSenderId: "116033291264",
    appId: "1:116033291264:web:bde7b2567463d2761244e5"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);
  
  let currentUser = null;
  let currentPage = 'home';
  let userLocation = null;
  let currentChatRoom = null;
  let unsubscribeMessages = null;
  let selectedImageFile = null;
  let html5QrScanner = null;

  // Availability options with time brackets
  const availabilityOptions = [
    { value: "Early Morning (5:00 AM - 8:00 AM)", label: "🌅 Early Morning (5:00 AM - 8:00 AM)" },
    { value: "Morning (8:00 AM - 12:00 PM)", label: "☀️ Morning (8:00 AM - 12:00 PM)" },
    { value: "Afternoon (12:00 PM - 4:00 PM)", label: "🌤️ Afternoon (12:00 PM - 4:00 PM)" },
    { value: "Evening (4:00 PM - 7:00 PM)", label: "🌙 Evening (4:00 PM - 7:00 PM)" },
    { value: "Night (7:00 PM - 10:00 PM)", label: "⭐ Night (7:00 PM - 10:00 PM)" },
    { value: "Late Night (10:00 PM - 5:00 AM)", label: "🌙 Late Night (10:00 PM - 5:00 AM)" },
    { value: "Flexible - Any time", label: "🕒 Flexible - Any time" }
  ];

  // Calculate distance between two coordinates (in km)
  function calculateDistance(lat1, lon1, lat2, lon2) {
    if (!lat1 || !lat2 || !lon1 || !lon2) return null;
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  }

  // Filter items by location (only show items within 50km)
  function filterByLocation(items, userLoc, maxDistance = 50) {
    if (!userLoc || !items) return items;
    return items.filter(item => {
      if (!item.location) return false;
      const distance = calculateDistance(userLoc.lat, userLoc.lng, item.location.lat, item.location.lng);
      return distance !== null && distance <= maxDistance;
    });
  }

  function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function enableLocation() {
    if (!navigator.geolocation) {
      showToast("Geolocation not supported");
      return;
    }
    showToast("📍 Getting your location...");
    navigator.geolocation.getCurrentPosition(
      (position) => {
        userLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
        showToast(`📍 Location set! Showing items near you.`);
        renderCurrentPage();
      },
      (error) => {
        console.error("Location error:", error);
        showToast("Please enable location to see nearby items");
      }
    );
  }

  // Upload image function
  async function uploadImage(file, path) {
    if (!file) return null;
    try {
      const storageRef = ref(storage, path);
      await uploadBytes(storageRef, file);
      return await getDownloadURL(storageRef);
    } catch(err) {
      console.error("Upload error:", err);
      return null;
    }
  }

  // Calculate match score
  function calculateMatchScore(donation, request) {
    let score = 0;
    const donationName = donation.name.toLowerCase();
    const requestName = request.name.toLowerCase();
    
    if (donationName.includes(requestName) || requestName.includes(donationName)) {
      score += 40;
    }
    
    if (donation.urgency === 'high' && request.urgency === 'high') score += 20;
    else if (donation.urgency === 'high' || request.urgency === 'high') score += 10;
    
    if (donation.availability === request.availability) score += 10;
    
    return Math.min(score, 100);
  }

  // Create match and open chat
  async function createMatchAndChat(donationId, requestId, donationName, requestName, donorId, donorName, requesterId, requesterName) {
    try {
      const matchId = `${donationId}_${requestId}_${Date.now()}`;
      const qrData = JSON.stringify({
        matchId: matchId,
        donationId: donationId,
        donationName: donationName,
        timestamp: Date.now()
      });
      
      await addDoc(collection(db, "matches"), {
        matchId: matchId,
        donationId: donationId,
        requestId: requestId,
        donationName: donationName,
        requestName: requestName,
        donorId: donorId,
        donorName: donorName,
        requesterId: requesterId,
        requesterName: requesterName,
        qrData: qrData,
        status: "pending_pickup",
        createdAt: serverTimestamp()
      });
      
      await updateDoc(doc(db, "donations", donationId), { status: "matched", matchId: matchId });
      await updateDoc(doc(db, "requests", requestId), { status: "matched", matchId: matchId });
      
      const chatId = [donorId, requesterId].sort().join('_');
      await addDoc(collection(db, "chats"), {
        chatId: chatId,
        matchId: matchId,
        participants: [donorId, requesterId],
        participantNames: {
          [donorId]: donorName,
          [requesterId]: requesterName
        },
        donationName: donationName,
        requestName: requestName,
        lastMessage: "Match created! You can now coordinate pickup.",
        lastMessageTime: serverTimestamp(),
        createdAt: serverTimestamp()
      });
      
      await addDoc(collection(db, "messages"), {
        chatId: chatId,
        senderId: "system",
        senderName: "ReLife AI",
        message: `🎉 Match found! ${donorName} has ${donationName} available. ${requesterName} needs it. Please coordinate pickup details here.`,
        timestamp: serverTimestamp(),
        isSystem: true
      });
      
      showToast("✓ Match found! Opening chat...");
      
      setTimeout(() => {
        openChat(chatId, donorId === currentUser?.uid ? requesterName : donorName, 
                donorId === currentUser?.uid ? requesterId : donorId, donationName, matchId);
      }, 1000);
      
      return matchId;
    } catch(err) {
      showToast("Error: " + err.message);
    }
  }

  // AI Matching Engine
  async function findAndCreateMatches() {
    const donationsSnap = await getDocs(query(collection(db, "donations"), where("status", "==", "available")));
    const requestsSnap = await getDocs(query(collection(db, "requests"), where("status", "==", "pending")));
    
    const donations = [];
    const requests = [];
    donationsSnap.forEach(doc => donations.push({ id: doc.id, ...doc.data() }));
    requestsSnap.forEach(doc => requests.push({ id: doc.id, ...doc.data() }));
    
    const matches = [];
    for (const donation of donations) {
      for (const request of requests) {
        const score = calculateMatchScore(donation, request);
        if (score > 60) {
          matches.push({ donation, request, score });
        }
      }
    }
    
    matches.sort((a, b) => b.score - a.score);
    
    if (matches.length > 0 && currentUser) {
      const topMatch = matches[0];
      const isDonor = topMatch.donation.userId === currentUser.uid;
      const isRequester = topMatch.request.userId === currentUser.uid;
      
      if (isDonor || isRequester) {
        showToast(`🤖 AI found a ${topMatch.score}% match! Opening chat...`);
        await createMatchAndChat(
          topMatch.donation.id, topMatch.request.id,
          topMatch.donation.name, topMatch.request.name,
          topMatch.donation.userId, topMatch.donation.userEmail?.split('@')[0] || 'Donor',
          topMatch.request.userId, topMatch.request.userEmail?.split('@')[0] || 'Requester'
        );
      }
    }
  }

  // Chat functions
  async function sendMessage(chatId, message) {
    if (!message.trim() || !currentUser) return;
    
    await addDoc(collection(db, "messages"), {
      chatId: chatId,
      senderId: currentUser.uid,
      senderName: currentUser.email.split('@')[0],
      message: message.trim(),
      timestamp: serverTimestamp(),
      read: false
    });
    
    const chatsQuery = query(collection(db, "chats"), where("chatId", "==", chatId));
    const chatSnapshot = await getDocs(chatsQuery);
    chatSnapshot.forEach(async (docSnap) => {
      await updateDoc(docSnap.ref, {
        lastMessage: message.trim(),
        lastMessageTime: serverTimestamp()
      });
    });
  }

  function loadMessages(chatId) {
    if (unsubscribeMessages) unsubscribeMessages();
    
    const messagesQuery = query(collection(db, "messages"), where("chatId", "==", chatId), orderBy("timestamp", "asc"));
    unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
      const messages = [];
      snapshot.forEach(doc => messages.push({ id: doc.id, ...doc.data() }));
      renderChatMessages(messages);
    });
  }

  function renderChatMessages(messages) {
    const container = document.getElementById('chatMessages');
    if (!container) return;
    
    container.innerHTML = messages.map(msg => `
      <div class="message ${msg.senderId === currentUser?.uid ? 'message-sent' : 'message-received'}">
        <div>${escapeHtml(msg.message)}</div>
        <div class="message-time">${msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Just now'}</div>
      </div>
    `).join('');
    
    container.scrollTop = container.scrollHeight;
  }

  function showDonorQR(matchId, donationName) {
    const qrData = JSON.stringify({
      matchId: matchId,
      donationName: donationName,
      verificationCode: Math.random().toString(36).substring(2, 10).toUpperCase(),
      timestamp: Date.now()
    });
    
    const qrContainer = document.getElementById('qrCodeContainer');
    qrContainer.innerHTML = '';
    new QRCode(qrContainer, {
      text: qrData,
      width: 200,
      height: 200,
      colorDark: "#FF6B6B",
      colorLight: "#ffffff"
    });
    document.getElementById('qrModal').classList.add('active');
    showToast("📱 QR Code generated! Share with receiver for pickup");
  }

  async function initScanner() {
    if (html5QrScanner) {
      try { await html5QrScanner.stop(); } catch(e) {}
    }
    
    html5QrScanner = new Html5Qrcode("qr-reader");
    try {
      await html5QrScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, async (decodedText) => {
        try {
          const data = JSON.parse(decodedText);
          const matchesQuery = query(collection(db, "matches"), where("matchId", "==", data.matchId));
          const querySnapshot = await getDocs(matchesQuery);
          
          if (!querySnapshot.empty) {
            const matchDoc = querySnapshot.docs[0];
            const match = matchDoc.data();
            
            if (match.status === 'pending_pickup') {
              document.getElementById('scanResult').innerHTML = `
                <div style="background: #D1FAE5; padding: 12px; border-radius: 12px; margin-top: 12px;">
                  <strong>✓ Valid QR Code!</strong><br>
                  Item: ${escapeHtml(match.donationName)}<br>
                  <button id="verifyPickupBtn" class="btn btn-success" style="margin-top: 8px;">Confirm Pickup</button>

  async function requestItem(donationId, donorId, donorName, itemName) {
    if (!currentUser) {
      showToast("Please login first");
      return;
    }
    if (currentUser.uid === donorId) {
      showToast("You cannot request your own item");
      return;
    }
    
    try {
      await updateDoc(doc(db, "donations", donationId), { 
        status: "requested",
        requestedBy: currentUser.uid,
        requestedAt: serverTimestamp()
      });
      
      const chatId = await getOrCreateChatRoom(donorId, donorName, donationId, itemName);
      await sendMessage(chatId, `Hi! I'm interested in your ${itemName}. When can I pick it up?`);
      
      showToast(`✓ Request sent! You can now chat with ${donorName}`);
      document.querySelector('[data-page="chats"]').click();
    } catch(err) {
      showToast("Error: " + err.message);
    }
  }

  async function getOrCreateChatRoom(otherUserId, otherUserName, matchId, itemName) {
    if (!currentUser) return null;
    
    const chatId = [currentUser.uid, otherUserId].sort().join('_');
    const chatsQuery = query(collection(db, "chats"), where("chatId", "==", chatId));
    const chatSnapshot = await getDocs(chatsQuery);
    
    if (chatSnapshot.empty) {
      await addDoc(collection(db, "chats"), {
        chatId: chatId,
        participants: [currentUser.uid, otherUserId],
        participantNames: {
          [currentUser.uid]: currentUser.email.split('@')[0],
          [otherUserId]: otherUserName
        },
        matchId: matchId,
        itemName: itemName,
        lastMessage: "Chat started",
        lastMessageTime: serverTimestamp(),
        createdAt: serverTimestamp()
      });
    }
    
    return chatId;
  }

      currentPage = btn.dataset.page;
      
      document.getElementById('appHeader').innerHTML = `
        <h1><i class="fas fa-leaf"></i> ReLife AI</h1>
        <div class="subtitle">Smart Community Expiry Rescue | Location Based</div>
      `;
      
      renderCurrentPage();
    });
  });

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    renderCurrentPage();
  });

  document.getElementById('closeQrBtn')?.addEventListener('click', () => {
    document.getElementById('qrModal').classList.remove('active');
  });
  
  document.getElementById('closeScannerBtn')?.addEventListener('click', async () => {
    document.getElementById('scannerModal').classList.remove('active');
    if (html5QrScanner) await html5QrScanner.stop();
    document.getElementById('scanResult').innerHTML = '';
  });
</script>
</body>
</html>
